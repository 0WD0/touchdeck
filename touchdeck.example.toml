# Example structured keymap for touchdeck-prototype.
# Set TOUCHDECK_CONFIG=/home/disk/Projects/touchdeck-prototype/touchdeck.example.toml
# or copy this to ./touchdeck.toml before running.

[layout]
svg = "layouts/phone-portrait.svg"

[keyboard]
# Optional raw XKB keymap file. If omitted, touchdeck uses a built-in us/pc105 keymap.
# xkb_keymap = "/path/to/keymap.xkb"

[[keyboard.maps]]
mode = "text"
layer = "base"

[keyboard.maps.tap]
key_q = "q"
key_w = "w"
key_e = "e"
key_r = "r"
key_t = "t"
key_y = "y"
key_u = "u"
key_i = "i"
key_o = "o"
key_p = "p"
key_a = "a"
key_s = "s"
key_d = "d"
key_f = "f"
key_g = "g"
key_h = "h"
key_j = "j"
key_k = "k"
key_l = "l"
key_z = "z"
key_x = "x"
key_c = "c"
key_v = "v"
key_b = "b"
key_n = "n"
key_m = "m"
key_shift = "<leftshift>"
key_ctrl = "<leftctrl>"
key_alt = "<leftalt>"
key_super = "<leftmeta>"
key_esc = "ESC"
key_spc = "SPC"
key_del = "DEL"
key_ret = "RET"

[keyboard.maps.swipe_up]
key_q = "1"
key_w = "2"
key_e = "3"
key_r = "4"
key_t = "5"
key_y = "6"
key_u = "7"
key_i = "8"
key_o = "9"
key_p = "0"
key_a = "!"
key_s = "@"
key_d = "#"
key_f = "$"
key_g = "%"
key_h = "^"
key_j = "&"
key_k = "*"
key_l = "_"
key_z = "`"
key_x = "-"
key_c = "="
key_v = "["
key_b = "]"
key_n = "/"
key_m = "?"
key_spc = "TAB"
key_del = "DELETE"
key_ret = "C-RET"

[keyboard.maps.swipe_down]
key_j = "<down>"
key_spc = "ESC"

[keyboard.maps.swipe_left]
key_h = "<left>"
key_spc = "DEL"
key_del = "M-DEL"
key_ret = "C-<left>"

[keyboard.maps.swipe_right]
key_l = "<right>"
key_spc = "RET"
key_del = "C-<right>"
key_ret = "C-<right>"

# Mode ownership controls.

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "hold", target = "left_bottom", min_ms = 180 }
behavior = { type = "mode_momentary", mode = "niri" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "hold", target = "left_bottom", min_ms = 180 }
behavior = { type = "mode_momentary", mode = "niri" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "double_tap", target = "left_bottom", max_ms = 280 }
behavior = { type = "mode_toggle", mode = "niri_locked" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "double_tap", target = "left_bottom", max_ms = 280 }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "double_tap", target = "bottom_edge", max_ms = 280 }
behavior = { type = "mode_toggle", mode = "passthrough" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "double_tap", target = "bottom_edge", max_ms = 280 }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "up" }
behavior = { type = "mode_toggle", mode = "text" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "up" }
behavior = { type = "mode", mode = "text" }

[[bindings]]
mode = "text"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "down" }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "text"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

# Layer examples.

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "hold", target = "center", min_ms = 220 }
behavior = { type = "layer_momentary", layer = "niri" }

# Let right-bottom tap fall through to the base layer while the niri layer is active.
[[bindings]]
mode = "base"
layer = "niri"
trigger = { type = "tap", target = "right_bottom" }
behavior = { type = "transparent" }

[[bindings]]
mode = "base"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "left" }
behavior = { type = "niri", action = "focus-column-left" }

[[bindings]]
mode = "base"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "right" }
behavior = { type = "niri", action = "focus-column-right" }

# Niri locked bindings. These override the built-in default niri gestures when matched.

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "left" }
behavior = { type = "niri", action = "focus-column-left" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "right" }
behavior = { type = "niri", action = "focus-column-right" }
