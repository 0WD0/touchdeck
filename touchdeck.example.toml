# Example structured keymap for touchdeck.
# Set TOUCHDECK_CONFIG=/home/disk/Projects/touchdeck/touchdeck.example.toml
# or copy this to ./touchdeck.toml before running.

[layout]
svg = "layouts/phone-portrait.svg"

[keyboard]
# Text output backend:
#   virtual-keyboard  Send Wayland zwp_virtual_keyboard_v1 events to the focused app.
#   ime               Send key events to touchdeck-ime over a Unix socket.
#   both              Send to both while developing the IME path.
output = "ime"
# ime_socket = "/run/user/1000/touchdeck-ime.sock"

# Optional raw XKB keymap file. If omitted, touchdeck uses a built-in us/pc105 keymap.
# xkb_keymap = "/path/to/keymap.xkb"

# ZMK-like behavior registry. Builtins are available even if this section is omitted:
#   &kp KEY       tap a key sequence
#   &kpe KEY      tap a key sequence and force effective Rime keysym translation
#   &kpr KEY      tap a key sequence and force raw Rime keysym translation
#   &ik KEY       tap through IME first; Rime handled keys are consumed, otherwise forwarded
#   &ak KEY       bypass IME and forward directly to the focused app
#   &it KEY       commit printable text through text-input instead of sending a key event
#   &io KEY       send to IME only; unhandled keys are consumed
#   &hold KEY     press on hold, release when the touch is released
#   &key_repeat   repeat the previous key, like ZMK &key_repeat
#   &hold_repeat KEY
#                 repeat a fixed key sequence while held
#   &trans        fall through to a lower active layer
#   &none         consume without action
#
# Named behaviors are aliases/templates.
[behaviors.shift_toggle]
binding = "&kp LSHIFT"

[behaviors.del_repeat]
type = "hold_repeat"
keys = "BSPC"

[behaviors.slash_question]
type = "mod_morph"
mods = ["LSHIFT"]
keep_mods = []
normal = "&kp SLASH"
morph = "&kpe QUESTION"

[ime]
# touchdeck-ime listens here by default when XDG_RUNTIME_DIR is set.
# output can also be set here and overrides [keyboard].output.
# output = "ime"
# socket = "/run/user/1000/touchdeck-ime.sock"
# Rime key translation:
#   effective  Physical Shift+/ is sent to Rime as "?"
#   raw        Physical Shift+/ is sent to Rime as "/" with Shift modifier
# Touch keyboard bindings can override this per behavior with &kpe / &kpr.
# Touch keyboard route defaults to "ime-key". You can override per behavior:
#   route = "ime-key"   Rime first, then forward unhandled keys to the app
#   route = "app-key"   bypass Rime
#   route = "ime-text"  commit printable text directly
#   route = "ime-only"  Rime first, consume unhandled keys
key_translation = "effective"

[ime.popup]
# Physical-keyboard candidate popup. Colors are #RRGGBB or #RRGGBBAA.
width = 560
max_candidates = 6
height_empty = 48
height_candidates = 88
header_height = 32
padding_x = 10
header_y = 5
candidate_gap = 6
candidate_min_width = 48
candidate_max_width = 154
candidate_unit_width = 8
candidate_extra_width = 26
preedit_font_size = 15.5
candidate_font_size = 16.0
background_color = "#1a2226e6"
border_color = "#798b8696"
separator_color = "#6c787270"
preedit_color = "#d8dee8ee"
candidate_text_color = "#fffffff0"
highlight_background_color = "#3b86f2dc"
first_candidate_background_color = "#2e3d4470"

[[keyboard.layers]]
mode = "text"
layer = "base"
# First repeat is deliberately slower than subsequent repeats, so swipe-hold
# gives one movement immediately and only repeats after a clear hold.
repeat_start_ms = 520
repeat_interval_ms = 55

[keyboard.layers.tap]
key_n1 = "&kp N1"
key_n2 = "&kp N2"
key_n3 = "&kp N3"
key_n4 = "&kp N4"
key_n5 = "&kp N5"
key_n6 = "&kp N6"
key_n7 = "&kp N7"
key_n8 = "&kp N8"
key_n9 = "&kp N9"
key_n0 = "&kp N0"
key_q = "&kp Q"
key_w = "&kp W"
key_e = "&kp E"
key_r = "&kp R"
key_t = "&kp T"
key_y = "&kp Y"
key_u = "&kp U"
key_i = "&kp I"
key_o = "&kp O"
key_p = "&kp P"
key_a = "&kp A"
key_s = "&kp S"
key_d = "&kp D"
key_f = "&kp F"
key_g = "&kp G"
key_h = "&kp H"
key_j = "&kp J"
key_k = "&kp K"
key_l = "&kp L"
key_semi = "&kp SEMI"
key_z = "&kp Z"
key_x = "&kp X"
key_c = "&kp C"
key_v = "&kp V"
key_b = "&kp B"
key_n = "&kp N"
key_m = "&kp M"
key_comma = "&kp COMMA"
key_dot = "&kp DOT"
key_fslh = "&slash_question"
thumb_ctrl = "&kp LCTRL"
thumb_shift = "&kp LSHIFT"
thumb_super = "&kp LGUI"
thumb_ret = "&kp RET"
thumb_spc = "&kp SPC"

[keyboard.layers.hold]
thumb_ctrl = "&hold LCTRL"
thumb_shift = "&hold LSHIFT"
thumb_super = "&hold LGUI"

[keyboard.layers.swipe_up]
key_n1 = "&kp EXCLAMATION"
key_n2 = "&kp AT_SIGN"
key_n3 = "&kp HASH"
key_n4 = "&kp DOLLAR"
key_n5 = "&kp PERCENT"
key_n6 = "&kp CARET"
key_n7 = "&kp AMPERSAND"
key_n8 = "&kp ASTERISK"
key_n9 = "&kp LEFT_PARENTHESIS"
key_n0 = "&kp RIGHT_PARENTHESIS"
key_h = "&hold_repeat LEFT"
key_j = "&hold_repeat DOWN"
key_k = "&hold_repeat UP"
key_l = "&hold_repeat RIGHT"
key_semi = "&kp COLON"
key_comma = "&kp LESS_THAN"
key_dot = "&kp GREATER_THAN"
key_fslh = "&kpe QUESTION"
thumb_spc = "&kp TAB"
thumb_ret = "&kp LC(RET)"

[keyboard.layers.swipe_down]
thumb_spc = "&kp ESC"

[keyboard.layers.swipe_left]
key_h = "&hold_repeat LEFT"
key_j = "&hold_repeat LEFT"
key_k = "&hold_repeat LEFT"
key_l = "&hold_repeat LEFT"
thumb_spc = "&hold_repeat BSPC"
thumb_ret = "&kp LC(LEFT)"

[keyboard.layers.swipe_right]
key_h = "&hold_repeat RIGHT"
key_j = "&hold_repeat RIGHT"
key_k = "&hold_repeat RIGHT"
key_l = "&hold_repeat RIGHT"
thumb_spc = "&kp RET"
thumb_ret = "&kp LC(RIGHT)"

# Mode ownership controls.

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "hold", target = "left_bottom", min_ms = 180 }
behavior = { type = "mode_momentary", mode = "niri" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "hold", target = "left_bottom", min_ms = 180 }
behavior = { type = "mode_momentary", mode = "niri" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "double_tap", target = "left_bottom", max_ms = 280 }
behavior = { type = "mode_toggle", mode = "niri_locked" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "double_tap", target = "left_bottom", max_ms = 280 }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "double_tap", target = "bottom_edge", max_ms = 280 }
behavior = { type = "mode_toggle", mode = "passthrough" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "double_tap", target = "bottom_edge", max_ms = 280 }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "up" }
behavior = { type = "mode_toggle", mode = "text" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "up" }
behavior = { type = "mode", mode = "text" }

[[bindings]]
mode = "text"
layer = "base"
trigger = { type = "swipe", target = "bottom_edge", direction = "down" }
behavior = { type = "mode", mode = "base" }

[[bindings]]
mode = "base"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "passthrough"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

[[bindings]]
mode = "text"
layer = "base"
trigger = { type = "tap", target = "top_left" }
behavior = { type = "exit" }

# Niri locked bindings. These override the built-in default niri gestures when matched.

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "left" }
behavior = { type = "niri", action = "focus-workspace-down" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "right" }
behavior = { type = "niri", action = "focus-workspace-up" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "up" }
behavior = { type = "niri", action = "focus-column-right" }

[[bindings]]
mode = "niri_locked"
layer = "niri"
trigger = { type = "swipe", target = "full", direction = "down" }
behavior = { type = "niri", action = "focus-column-left" }
