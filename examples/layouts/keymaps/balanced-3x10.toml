# Balanced 3x10 phone layout.
# Shape: Q..P / A..L RET / LSHIFT Z..M BSPC SPC.

[behaviors.del_repeat]
type = "hold_repeat"
keys = "BSPC"

[behaviors.slash_question]
type = "mod_morph"
mods = ["LSHIFT"]
keep_mods = []
normal = "&kp SLASH"
morph = "&kpe QUESTION"

[[keyboard.layers]]
mode = "text"
layer = "base"
repeat_start_ms = 360
repeat_interval_ms = 45

[keyboard.layers.tap]
key_q = "&kp Q"
key_w = "&kp W"
key_e = "&kp E"
key_r = "&kp R"
key_t = "&kp T"
key_y = "&kp Y"
key_u = "&kp U"
key_i = "&kp I"
key_o = "&kp O"
key_p = "&kp P"
key_a = "&kp A"
key_s = "&kp S"
key_d = "&kp D"
key_f = "&kp F"
key_g = "&kp G"
key_h = "&kp H"
key_j = "&kp J"
key_k = "&kp K"
key_l = "&kp L"
key_ret = "&kp RET"
key_shift = "&kp LSHIFT"
key_z = "&kp Z"
key_x = "&kp X"
key_c = "&kp C"
key_v = "&kp V"
key_b = "&kp B"
key_n = "&kp N"
key_m = "&kp M"
key_del = "&kp BSPC"
key_spc = "&kp SPC"

[keyboard.layers.hold]
key_shift = "&hold LSHIFT"
key_ctrl = "&hold LCTRL"
key_alt = "&hold LALT"
key_super = "&hold LGUI"

[keyboard.layers.repeat]
key_del = "&del_repeat"

[keyboard.layers.swipe_up]
key_q = "&kp N1"
key_w = "&kp N2"
key_e = "&kp N3"
key_r = "&kp N4"
key_t = "&kp N5"
key_y = "&kp N6"
key_u = "&kp N7"
key_i = "&kp N8"
key_o = "&kp N9"
key_p = "&kp N0"
key_a = "&kp EXCLAMATION"
key_s = "&kp AT_SIGN"
key_d = "&kp HASH"
key_f = "&kp DOLLAR"
key_g = "&kp PERCENT"
key_h = "&kp CARET"
key_j = "&kp AMPERSAND"
key_k = "&kp UP"
key_l = "&kp UNDERSCORE"
key_z = "&kp GRAVE"
key_x = "&kp MINUS"
key_c = "&kp EQUAL"
key_v = "&kp LEFT_BRACKET"
key_b = "&kp RIGHT_BRACKET"
key_n = "&slash_question"
key_m = "&kpe QUESTION"
key_del = "&kp DELETE"
key_spc = "&kp TAB"
key_ret = "&kp LC(RET)"

[keyboard.layers.swipe_down]
key_j = "&kp DOWN"
key_k = "&kp ASTERISK"
key_spc = "&kp ESC"

[keyboard.layers.swipe_left]
key_h = "&kp LEFT"
key_spc = "&kp BSPC"
key_del = "&kp LA(BSPC)"
key_ret = "&kp LC(LEFT)"

[keyboard.layers.swipe_right]
key_l = "&kp RIGHT"
key_spc = "&kp RET"
key_del = "&kp LC(RIGHT)"
key_ret = "&kp LC(RIGHT)"
