# Symbol-heavy 3x10 layer snippet.
# Keeps letters on tap and puts dense punctuation on flicks.

[behaviors.del_repeat]
type = "hold_repeat"
keys = "BSPC"

[[keyboard.layers]]
mode = "text"
layer = "base"
repeat_start_ms = 360
repeat_interval_ms = 45

[keyboard.layers.tap]
key_q = "&kp Q"
key_w = "&kp W"
key_e = "&kp E"
key_r = "&kp R"
key_t = "&kp T"
key_y = "&kp Y"
key_u = "&kp U"
key_i = "&kp I"
key_o = "&kp O"
key_p = "&kp P"
key_a = "&kp A"
key_s = "&kp S"
key_d = "&kp D"
key_f = "&kp F"
key_g = "&kp G"
key_h = "&kp H"
key_j = "&kp J"
key_k = "&kp K"
key_l = "&kp L"
key_ret = "&kp RET"
key_shift = "&kp LSHIFT"
thumb_ctrl = "&kp LCTRL"
thumb_shift = "&kp LSHIFT"
thumb_super = "&kp LGUI"
thumb_ret = "&kp RET"
thumb_spc = "&kp SPC"
key_z = "&kp Z"
key_x = "&kp X"
key_c = "&kp C"
key_v = "&kp V"
key_b = "&kp B"
key_n = "&kp N"
key_m = "&kp M"
key_del = "&kp BSPC"
key_spc = "&kp SPC"

[keyboard.layers.hold]
key_shift = "&hold LSHIFT"
key_ctrl = "&hold LCTRL"
key_alt = "&hold LALT"
key_super = "&hold LGUI"
thumb_ctrl = "&hold LCTRL"
thumb_shift = "&hold LSHIFT"
thumb_super = "&hold LGUI"

[keyboard.layers.repeat]
key_del = "&del_repeat"

[keyboard.layers.swipe_up]
key_q = "&kp LEFT_BRACE"
key_w = "&kp RIGHT_BRACE"
key_e = "&kp LEFT_BRACKET"
key_r = "&kp RIGHT_BRACKET"
key_t = "&kp LEFT_PARENTHESIS"
key_y = "&kp RIGHT_PARENTHESIS"
key_u = "&kp LESS_THAN"
key_i = "&kp GREATER_THAN"
key_o = "&kp PIPE"
key_p = "&kp BACKSLASH"
key_a = "&kp EXCLAMATION"
key_s = "&kp AT_SIGN"
key_d = "&kp HASH"
key_f = "&kp DOLLAR"
key_g = "&kp PERCENT"
key_h = "&kp CARET"
key_j = "&kp AMPERSAND"
key_k = "&kp ASTERISK"
key_l = "&kp QUESTION"
key_z = "&kp GRAVE"
key_x = "&kp TILDE"
key_c = "&kp MINUS"
key_v = "&kp UNDERSCORE"
key_b = "&kp EQUAL"
key_n = "&kp PLUS"
key_m = "&kp SLASH"
key_spc = "&kp TAB"
key_del = "&kp DELETE"
key_ret = "&kp LC(RET)"
thumb_spc = "&kp TAB"
thumb_ret = "&kp LC(RET)"

[keyboard.layers.swipe_left]
key_h = "&kp LEFT"
key_del = "&kp LA(BSPC)"

[keyboard.layers.swipe_right]
key_l = "&kp RIGHT"
key_ret = "&kp RET"
